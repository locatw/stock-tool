services:
  db:
    image: postgres:17.5
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=stock
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-1234}
    volumes:
      - db-vol:/var/lib/postgresql/data
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data"
    ports:
      - 8333:8333
      - 9333:9333
      - 8888:8888
    volumes:
      - seaweedfs-vol:/data
volumes:
  db-vol:
  seaweedfs-vol:
