services:
  db:
    image: postgres:17.5
    ports:
      - 5432:5432
    environment:
      - POSTGRES_DB=stock
      - POSTGRES_USER=${DB_USER:-postgres}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-1234}
    volumes:
      - db-vol:/var/lib/postgresql/data
  seaweedfs:
    image: chrislusf/seaweedfs:latest
    command: "server -s3 -dir=/data"
    ports:
      - 8333:8333
      - 9333:9333
      - 8888:8888
    volumes:
      - seaweedfs-vol:/data
  seaweedfs-init:
    image: amazon/aws-cli:latest
    depends_on:
      - seaweedfs
    environment:
      - AWS_ACCESS_KEY_ID=admin
      - AWS_SECRET_ACCESS_KEY=admin
      - AWS_DEFAULT_REGION=ap-northeast-1
    entrypoint: >
      /bin/sh -c "
        sleep 5 &&
        aws --endpoint-url http://seaweedfs:8333 s3 mb s3://${S3_BUCKET:-locatw-dev-stocktool-lakehouse} 2>/dev/null || true
      "
  api-doc:
    image: redocly/redoc:v2.5.1
    command: ["nginx", "-g", "daemon off;"]
    ports:
      - ${API_DOC_PORT:-8080}:80
    volumes:
      - ./backend/api/definition:/usr/share/nginx/html/spec
      - ./backend/api/config/redoc/index.html:/usr/share/nginx/html/index.html
    profiles:
      - doc
volumes:
  db-vol:
  seaweedfs-vol:
