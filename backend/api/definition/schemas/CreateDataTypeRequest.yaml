type: object
required:
  - dataSourceId
  - name
  - enabled
  - updateFrequency
  - updateTimes
  - backfillEnabled
  - staleTimeoutMinutes
  - settings
properties:
  dataSourceId:
    type: string
    format: uuid
  name:
    type: string
    minLength: 1
  enabled:
    type: boolean
  updateFrequency:
    type: string
    enum:
      - daily
      - weekly
      - monthly
      - hourly
  updateTimes:
    type: array
    items:
      type: string
  backfillEnabled:
    type: boolean
  staleTimeoutMinutes:
    type: integer
    minimum: 0
  settings:
    type: object
    additionalProperties: true
