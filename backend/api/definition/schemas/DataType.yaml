type: object
required:
  - id
  - dataSourceId
  - name
  - enabled
  - schedule
  - backfillEnabled
  - staleTimeoutMinutes
  - settings
  - createdAt
  - updatedAt
properties:
  id:
    type: string
    format: uuid
  dataSourceId:
    type: string
    format: uuid
  name:
    type: string
  enabled:
    type: boolean
  schedule:
    $ref: './Schedule.yaml'
  backfillEnabled:
    type: boolean
  staleTimeoutMinutes:
    type: integer
    minimum: 0
  settings:
    type: object
    additionalProperties: true
  createdAt:
    type: string
    format: date-time
  updatedAt:
    type: string
    format: date-time
