type: object
required:
  - name
  - enabled
  - schedule
  - backfillEnabled
  - staleTimeoutMinutes
  - settings
properties:
  name:
    description: Name of the data type.
    type: string
    minLength: 1
    example: "stock_prices"
  enabled:
    description: Whether this data type should be actively ingested.
    type: boolean
    example: true
  schedule:
    $ref: './Schedule.yaml'
  backfillEnabled:
    description: Whether historical data backfill is enabled.
    type: boolean
    example: true
  staleTimeoutMinutes:
    description: Minutes after the scheduled time before a run is considered stale.
    type: integer
    minimum: 0
    example: 30
  settings:
    description: Data-type-specific ingestion configuration.
    type: object
    additionalProperties: true
    example: {}
