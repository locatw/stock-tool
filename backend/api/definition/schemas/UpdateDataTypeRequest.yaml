type: object
required:
  - name
  - enabled
  - schedule
  - backfillEnabled
  - staleTimeoutMinutes
  - settings
properties:
  name:
    type: string
    minLength: 1
  enabled:
    type: boolean
  schedule:
    $ref: './Schedule.yaml'
  backfillEnabled:
    type: boolean
  staleTimeoutMinutes:
    type: integer
    minimum: 0
  settings:
    type: object
    additionalProperties: true
